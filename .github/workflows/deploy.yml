name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'radar/**'
      - 'docs/**'
      - '*.md'
      - 'logo-concepts/**'
      - 'audit/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore signing key
        run: |
          mkdir -p .keys
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" > .keys/private.pem

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thefourthangle --branch=main --commit-message="${{ github.event.head_commit.message }}"
