name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'radar/**'
      - 'docs/**'
      - '*.md'
      - 'logo-concepts/**'
      - 'audit/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate signing secret
        env:
          TFA_PRIVATE_KEY_B64: ${{ secrets.TFA_PRIVATE_KEY_B64 || secrets.SIGNING_KEY_BASE64 }}
          TFA_PRIVATE_KEY_PEM: ${{ secrets.TFA_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$TFA_PRIVATE_KEY_B64" ] && [ -z "$TFA_PRIVATE_KEY_PEM" ]; then
            echo "Missing signing secret. Configure TFA_PRIVATE_KEY_B64 or TFA_PRIVATE_KEY_PEM."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          TFA_PRIVATE_KEY_B64: ${{ secrets.TFA_PRIVATE_KEY_B64 || secrets.SIGNING_KEY_BASE64 }}
          TFA_PRIVATE_KEY_PEM: ${{ secrets.TFA_PRIVATE_KEY_PEM }}

      - name: Bundle-size budget
        run: npm run check-bundle

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright e2e
        run: npm run e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Verify published signatures
        run: npm run check-signatures

      - name: Extract commit subject
        id: msg
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1 | tr -d '"')
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thefourthangle --branch=main --commit-message="${{ steps.msg.outputs.subject }}"
