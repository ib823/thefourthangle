name: TFA Radar Scan

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Manual trigger button in GitHub UI

permissions:
  contents: write  # Needed to commit state back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Kill if stuck

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'radar/requirements.txt'

      - name: Install dependencies
        run: pip install -r radar/requirements.txt

      - name: Run radar scan
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p radar/output/logs
          python radar/run-radar.py --once 2>&1 | tee radar/output/logs/last-cycle.log

      - name: Check scan health
        if: always()
        run: |
          python3 -c "
          import json, sys
          try:
              with open('radar/output/health.json') as f:
                  health = json.load(f)
              sources = health.get('sources', {})
              failed = [s for s, v in sources.items() if v.get('status') == 'failed']
              if failed:
                  print(f'WARNING: Failed sources: {failed}')
              print(f'Sources: {len(sources)} configured, {len(sources) - len(failed)} healthy')
          except FileNotFoundError:
              print('No health.json yet — first run')
          try:
              with open('radar/output/issue-queue.json') as f:
                  issues = json.load(f)
              print(f'Issues: {len(issues)} tracked')
              if issues:
                  top = issues[0]
                  print(f'Top: {top.get(\"title\",\"?\")} (score={top.get(\"controversy_score\",0):.3f})')
          except FileNotFoundError:
              print('No issue-queue.json yet')
          "

      - name: Commit updated state and results
        if: success()
        run: |
          git config user.name "Fourth Angle Radar"
          git config user.email "fourthangle@proton.me"

          # Add radar output files
          git add radar/output/state.json || true
          git add radar/output/issue-queue.json || true
          git add radar/output/health.json || true
          git add radar/output/logs/last-cycle.log || true

          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "radar: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Push failed — will retry next cycle"
