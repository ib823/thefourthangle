name = "tfa-notify"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[triggers]
# Every 15 min: check for new issues
# Every Monday 8am MYT (UTC+8 = midnight UTC): weekly digest
# Every day 9am MYT: re-engagement check
crons = ["*/15 * * * *", "0 0 * * 1", "0 1 * * *"]

